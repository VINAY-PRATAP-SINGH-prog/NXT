<!DOCTYPE html>
<head>
    <title>NXT Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
    <script src="script.js"></script>
<body>
    <h1>NXT</h1>
    <div class="navbar">
        <h1>NXT Security Dashboard</h1>
    </div>
    <div class="container">
    <div class="cards">
        <h2>Threats Today</h2>
        <p id="threat-count">0</p>

    </div>

    <div class="cards">
        <h2> Files Monitored</h2>
        <p id="file-count">0</p>

    </div>

    <div class="cards">
        <h2>Alerts</h2>
        <p id="alert-count">0</p>
    </div>
    </div>
    <div class="status">
        <h2>Threat Monitor</h2>
        <div id="threat-list"></div>
    </div>
    <div class="acti">
    <h2>Recent Activity</h2>

    <ul>
        <li>System Started</li>
        <li>Monitoring Enabled</li>
        <li>No Threats Detected</li>
    </ul>
    </div>
</body>
</html>
